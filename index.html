<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Card Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #333;
    }

    .form-box {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    .card {
      width: 320px;
      background: white;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: none;
    }

    .card h2 {
      color: darkblue;
    }

    .card p {
      font-size: 18px;
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <h1>Student Card Generator</h1>

  <div class="form-box">
    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="age" placeholder="Enter Age">
    <input type="text" id="class" placeholder="Enter Class">

    <button id="generate">Generate Card</button>
  </div>

  <div class="card" id="studentCard">
    <h2>Student Card</h2>

    <p><strong>Name:</strong> <span id="cardName"></span></p>
    <p><strong>Age:</strong> <span id="cardAge"></span></p>
    <p><strong>Class:</strong> <span id="cardClass"></span></p>
  </div>

  <script>
    let generateBtn = document.getElementById("generate");

    let nameInput = document.getElementById("name");
    let ageInput = document.getElementById("age");
    let classInput = document.getElementById("class");

    let card = document.getElementById("studentCard");

    let cardName = document.getElementById("cardName");
    let cardAge = document.getElementById("cardAge");
    let cardClass = document.getElementById("cardClass");

    generateBtn.addEventListener("click", function () {

      cardName.innerText = nameInput.value;
      cardAge.innerText = ageInput.value;
      cardClass.innerText = classInput.value;

      card.style.display = "block";
    });
  </script>

</body>
</html>
